services:
  backend:
    build:
      context: ../../backend
    image: pinner-backend:dev
    container_name: pinner-dev-backend
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m"
    volumes:
      - uploads_dev:/home/app/pinner/uploads
    networks:
      - pinner-dev

  frontend:
    build:
      context: ../../frontend
      args:
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY}
        VITE_DEMO_ENABLED: ${VITE_DEMO_ENABLED:-false}
    image: pinner-frontend:dev
    container_name: pinner-dev-frontend
    restart: unless-stopped
    ports:
      - "30000:80"
    depends_on:
      - backend
    networks:
      - pinner-dev

networks:
  pinner-dev:
    driver: bridge

volumes:
  uploads_dev:
