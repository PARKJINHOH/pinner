version: '3.8'

services:
  mariadb:
    image: mariadb:11.4
    env_file: .env
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
    volumes:
      - mariadb_dev_data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine

  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      - mariadb
      - redis
    volumes:
      - uploads_dev:/app/uploads

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/usr/share/nginx/html
    depends_on:
      - backend

volumes:
  mariadb_dev_data:
  uploads_dev:
