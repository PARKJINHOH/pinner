version: '3.8'

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - pinner-dev-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
    networks:
      - pinner-dev-network
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file: .env.dev
    environment:
      SPRING_PROFILES_ACTIVE: dev
    volumes:
      - ./volumes/uploads:/app/uploads
    depends_on:
      - mariadb
      - redis
    networks:
      - pinner-dev-network
    restart: unless-stopped

  mariadb:
    image: mariadb:11.4
    env_file: .env.dev
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MYSQL_DATABASE}
      MARIADB_USER: ${MYSQL_USER}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./volumes/mariadb/dev:/var/lib/mysql
    networks:
      - pinner-dev-network
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    networks:
      - pinner-dev-network
    restart: unless-stopped

networks:
  pinner-dev-network:
    driver: bridge
