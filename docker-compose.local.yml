version: '3.8'

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - pinner-local-network
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
      - frontend_local_modules:/app/node_modules
    ports:
      - "5173:5173"
    networks:
      - pinner-local-network

  backend:
    build:
      context: ./backend
    env_file: .env.local
    environment:
      SPRING_PROFILES_ACTIVE: local
    ports:
      - "8080:8080"
    volumes:
      - ./volumes/uploads:/app/uploads
    depends_on:
      - mariadb
      - redis
    networks:
      - pinner-local-network

  mariadb:
    image: mariadb:11.4
    env_file: .env.local
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MYSQL_DATABASE}
      MARIADB_USER: ${MYSQL_USER}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - ./volumes/mariadb/local:/var/lib/mysql
    networks:
      - pinner-local-network

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    networks:
      - pinner-local-network

volumes:
  frontend_local_modules:

networks:
  pinner-local-network:
    driver: bridge
