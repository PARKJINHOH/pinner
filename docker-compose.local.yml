version: '3.8'

services:
  mariadb:
    image: mariadb:11.4
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: pinner_local
    ports:
      - "3306:3306"
    volumes:
      - mariadb_local_data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_NAME: pinner_local
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    depends_on:
      - mariadb
      - redis
    volumes:
      - ./uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.local.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend

volumes:
  mariadb_local_data:
